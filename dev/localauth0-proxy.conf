# CORS + nonce-forwarding proxy for localauth0  (requires OpenResty).
#
# localauth0 doesn't propagate the OIDC nonce from /authorize into the
# ID token.  It *will* include one if the /oauth/token request body has a
# "nonce" field.  The Auth0 SPA SDK only sends nonce on the authorize
# redirect (per spec), so we capture it there and inject it into the
# token exchange.

lua_shared_dict nonces 1m;

server {
  listen 80;
  server_name _;

  # --- /authorize: capture nonce (browser navigation, no CORS needed) ---
  location = /authorize {
    access_by_lua_block {
      local raw = ngx.var.arg_nonce
      if raw then
        ngx.shared.nonces:set("latest", ngx.unescape_uri(raw), 300)
      end
    }

    proxy_pass http://localauth0:3000;
  }

  # --- /oauth/token: inject stored nonce into request body ---------------
  location = /oauth/token {
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' 'http://localhost:3000';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, auth0-client';
      add_header 'Access-Control-Max-Age' 86400;
      return 204;
    }

    access_by_lua_block {
      ngx.req.read_body()
      local body  = ngx.req.get_body_data()
      local nonce = ngx.shared.nonces:get("latest")
      if nonce and body then
        body = body .. "&nonce=" .. ngx.escape_uri(nonce)
        ngx.req.set_body_data(body)
        ngx.req.set_header("Content-Length", tostring(#body))
      end
    }

    proxy_pass http://localauth0:3000;

    add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, auth0-client' always;
  }

  # --- everything else: plain proxy + CORS -------------------------------
  location / {
    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Origin' 'http://localhost:3000';
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, auth0-client';
      add_header 'Access-Control-Max-Age' 86400;
      return 204;
    }

    proxy_pass http://localauth0:3000;

    add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, auth0-client' always;
  }
}
