issuer = "http://localauth0:3000/"

[user_info]
subject = "mock|dev-user-1"
name = "Dev User"
email = "dev@example.com"
email_verified = true

[[audience]]
name = "stitch-api-local"
permissions = []

[[audience]]
name = "wrong-audience"
permissions = []

# Inject user-profile claims into the access token.
# This mirrors a real Auth0 "Login / Post Login" Action that copies
# email and name into the access_token for API consumption.
[access_token]
custom_claims = [
    { name = "email", value = { String = "dev@example.com" } },
    { name = "name", value = { String = "Dev User" } },
]

[http]
port = 3000
