services:
  api:
    build:
      target: dev
    environment:
      LOG_LEVEL: debug
    develop:
      watch:
        # Source directories — synced into the running container.
        # NOTE: these must stay in sync with workspace deps of stitch-api.
        - path: ./deployments/api/src
          action: sync
          target: /app/deployments/api/src
        - path: ./packages/stitch-core/src
          action: sync
          target: /app/packages/stitch-core/src
        # Dependency changes — full rebuild.
        - path: ./deployments/api/pyproject.toml
          action: rebuild
        - path: ./packages/stitch-core/pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild
